version: '3.9'

services:

  backend:

    build: ./backend

    ports:
      - "8000:8000"

    

    depends_on:
      - db

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/etl_guard


  frontend:

    build: ./frontend

    ports:
      - "3000:3000"

    

    stdin_open: true

    depends_on:
      - backend


  db:

    image: postgres:15

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: etl_guard

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:

  postgres_data: